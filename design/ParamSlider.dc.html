<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;gap:7px;padding:7px 0;">
  <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;">
    <span title="{{ hint }}" style="font:600 10.5px/1.2 'IBM Plex Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:#7c766a;cursor:help;">{{ label }}</span>
    <span style="font:600 13px/1 'IBM Plex Mono',monospace;color:#1b1a17;white-space:nowrap;">{{ display }}<span style="color:#b0aa9b;font-weight:500;margin-left:3px;">{{ unit }}</span></span>
  </div>
  <input type="range" min="{{ min }}" max="{{ max }}" step="{{ step }}" value="{{ value }}" onInput="{{ onInput }}" style="width:100%;height:4px;accent-color:#ea8a0c;cursor:pointer;" />
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:56}}"></script>
</body>
</html>
